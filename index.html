<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>idk</title>
    <link rel="stylesheet" href="CSS\main.css">
</head>
<body>
    <div id = "title">СДЕЛАЙТЕ ЗАКАЗ НАПРЯМУЮ ИЗ РЕСТОРАНА</div>
    <main>
        <div id = "menu">
            <div id = "navig">
                <button class="navig_button">Пицца</button>
                <button class="navig_button">Шаурма</button>
                <button class="navig_button">Сэндвичи</button>
                <button class="navig_button">Бургеры</button>
                <button class="navig_button">Курица & Картофель</button>
                <button class="navig_button">Тортилья & Салаты</button>
                <button class="navig_button">Напитки & Десерты</button>
            </div>
            <div id = "cart">
                <div id = "cart_title">
                        <img src="assets\cart.png" alt="" id = "cart_img">
                        <div id = "cart_shadow"></div>
                        <p>Корзина</p>
                        
                </div>
                <div id = "cart_manage">
                    <table id = "cart_content">
                        <thead>
                            <th>Название</th>
                            <th>Количество</th>
                            <th>Цена</th>
                        </thead>
                        <tbody></tbody>
                        <tfoot>
                            <tr>
                              <td colspan="3">Итого: 0 руб.</td>
                            </tr>
                        </tfoot>
                    </table>
                    <button id = "cart_button">ОФОРМИТЬ ЗАКАЗ</button>
                </div>
            </div>
        </div>
        <div id = "product_list">
            <div class = "product">
                <img class="product_market" src="assets/subway_logo.png" alt="">
                <div class = "product_img">
                    <img src="assets/ovoshnoy.png" alt="">
                </div>
                <table class = "product_description">
                    <thead>
                        <th>Овощной</th>
                    </thead>
                    <tbody>
                        <td>Соус и овощи на выбор</td>
                    </tbody>
                    <tfoot>
                        <tr><td>Цена: 110 руб.</td></tr>
                    </tfoot>
                </table>
                <div class = "product_value">
                    <p>КОЛИЧЕСТВО</p>
                    <div class="product_val_changer">
                        <button class = "product_val_remove">-</button>
                        <div class="product_val_indicator">0</div>
                        <button class = "product_val_add">+</button>
                    </div>
                </div>
                <button class = "product_add_to_cart">В КОРЗИНУ</button>
            </div>
            <div class = "product">
                <img class="product_market" src="assets/subway_logo.png" alt="">
                <div class = "product_img">
                    <img src="assets/ovoshnoy.png" alt="">
                </div>
                <table class = "product_description">
                    <thead>
                        <th>Овощной</th>
                    </thead>
                    <tbody>
                        <td>Соус и овощи на выбор</td>
                    </tbody>
                    <tfoot>
                        <tr><td>Цена: 110 руб.</td></tr>
                    </tfoot>
                </table>
                <div class = "product_value">
                    <p>КОЛИЧЕСТВО</p>
                    <div class="product_val_changer">
                        <button class = "product_val_remove">-</button>
                        <div class="product_val_indicator">0</div>
                        <button class = "product_val_add">+</button>
                    </div>
                </div>
                <button class = "product_add_to_cart">В КОРЗИНУ</button>
            </div>
        </div>
    </main>
    <script src="scripts/products.js" type="module"></script>
</body>
</html>
