<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <title>idk</title>
        <link rel="stylesheet" href="CSS\main.css" />
    </head>
    <body>
        <div id="title">СДЕЛАЙТЕ ЗАКАЗ НАПРЯМУЮ ИЗ РЕСТОРАНА</div>
        <main>
            <div id="modal-overlay">
                <div id="modal">
                    <div id="modal-title">
                        <button id="modal-close">X</button>
                        <span id="modal-title-text">Текст</span>
                    </div>
                    <div id="modal-navig"></div>
                    <div id="modal-np-buttons">
                        <button id="modal-previous">< НАЗАД</button>
                        <button id="modal-next">ВПЕРЕД ></button>
                    </div>
                    <div id="modal-options"></div>
                    <div id="modal-finish"></div>
                    <div id="modal-foot">
                        <p id="modal-total-price"></p>
                    </div>
                </div>
            </div>

            <div id="modal-cart-overlay">
                <div id="modal">
                    <div id="modal-title">
                        <button id="modal-cart-close">X</button>
                        <span id="modal-title-text">Проверьте и подтвердите заказ</span>
                    </div>
                    <div id="modal-cart"></div>
                    <div id="modal-cart-foot">
                        <p id="modal-total-price">Итого: 0 руб.</p>
                        <button id="confirm-the-order">Подтвердить заказ</button>
                    </div>
                </div>
            </div>

            <div id="menu">
                <div id="navig">
                    <!--
                <button class="navig-button" id = "navig-pizza">Пицца</button>
                <button class="navig-button" id = "navig-shaurma">Шаурма</button>
                <button class="navig-button" id = "navig-sandwiches" disabled>Сэндвичи</button>
                <button class="navig-button" id = "navig-burgers">Бургеры</button>
                <button class="navig-button" id = "navig-chicken">Курица & Картофель</button>
                <button class="navig-button" id = "navig-salads">Тортилья & Салаты</button>
                <button class="navig-button" id = "navig-drinks">Напитки & Десерты</button>
                --></div>
                <div id="cart">
                    <div id="cart-title">
                        <img src="assets/i/cart.png" alt="" id="cart-img" />
                        <div id="cart-shadow"></div>
                        <p>Корзина</p>
                    </div>
                    <table class="cart-content">
                        <thead>
                            <th>Название</th>
                            <th>Количество</th>
                            <th>Цена</th>
                        </thead>
                    </table>
                    <div id="cart-manage">
                        <table class="cart-content">
                            <tbody></tbody>
                        </table>
                    </div>
                    <p id="cart-total-price">Итого: 0 руб.</p>
                    <button id="cart-button">ОФОРМИТЬ ЗАКАЗ</button>
                </div>
            </div>
            <div id="product-list"></div>
        </main>
        <!--
    <script src="scripts/product_list.js" type="module"></script>
    <script src="scripts/products.js" type="module"></script>
    <script src="scripts/menu.js" type="module"></script>
    <script src="scripts/sandwiches_options.js" type="module"></script>
    <script src="scripts/sandwiches_options_navig.js" type="module"></script>
    <script src="scripts/cart.js" type="module"></script>
    -->
        <script src="scripts/main.js" type="module"></script>
    </body>
</html>
