<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>idk</title>
    <link rel="stylesheet" href="CSS\main.css">
</head>
<body>
    <main>
        <div id = "title">СДЕЛАЙТЕ ЗАКАЗ НАПРЯМУЮ ИЗ РЕСТОРАНА</div>
        <div>
            <div id = "navig">
                <button class="navig_button">Пицца</button>
                <button class="navig_button">Шаурма</button>
                <button class="navig_button">Сэндвичи</button>
                <button class="navig_button">Бургеры</button>
            </div>
            <div id = "cart">
                <div>
                    <div id = "cart_title">
                        <img src="assets\cart.png" alt="" id = "cart_img">
                        <div id = "cart_shadow"></div>
                        <p>Корзина</p>
                        
                    </div>
                    <div id = "cart_manage">
                        <table id = "cart_content">
                            <thead>
                                <th>Название</th>
                                <th>Количество</th>
                            </thead>
                            <tfoot>
                                <tr>
                                  <td colspan="2">Итого: 0 руб.</td>
                                </tr>
                            </tfoot>
                        </table>
                        <button id = "cart_button">ОФОРМИТЬ ЗАКАЗ</button>
                    </div>
                </div>
            </div>
        </div>
        <div>
            <div class = "product">
                <div class = "product_img"></div>
            </div>
        </div>
    </main>
    <script src=".js"></script>
</body>
</html>
