<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>idk</title>
    <link rel="stylesheet" href="CSS\main.css">
</head>
<body>
    <div id = "title">СДЕЛАЙТЕ ЗАКАЗ НАПРЯМУЮ ИЗ РЕСТОРАНА</div>
    <main>

        
        <div id="modal_overlay">
            <div class="modal">
                <div class="modal_title">
                    <button id="modal_close">X</button>
                    Текст
                </div>
                <div class="modal_navig">
                    <button class="modal_navig_button" id = "navig_sizes">Размер</button>
                    <button class="modal_navig_button" id = "navig_breads">Хлеб</button>
                    <button class="modal_navig_button" id = "navig_vegetables">Овощи</button>
                    <button class="modal_navig_button" id = "navig_sauces">Соусы</button>
                    <button class="modal_navig_button" id = "navig_fillings">Начинка</button>
                    <button class="modal_navig_button" id = "navig_finish">Готово!</button>
                </div>
                <div id="modal_np_buttons">
                    <button id = "modal_previous">< НАЗАД</button>
                    <button id = "modal_next">ВПЕРЕД ></button>
                </div>
                <div id="modal_options"></div>
                <div class="modal_foot">
                    Итого: 0 руб.
                </div>
            </div>
        </div>


        <div id = "menu">
            <div id = "navig">
                <button class="navig_button" id = "navig_pizza">Пицца</button>
                <button class="navig_button" id = "navig_shaurma">Шаурма</button>
                <button class="navig_button" id = "navig_sandwiches" disabled>Сэндвичи</button>
                <button class="navig_button" id = "navig_burgers">Бургеры</button>
                <button class="navig_button" id = "navig_chicken">Курица & Картофель</button>
                <button class="navig_button" id = "navig_salads">Тортилья & Салаты</button>
                <button class="navig_button" id = "navig_drinks">Напитки & Десерты</button>
            </div>
            <div id = "cart">
                <div id = "cart_title">
                        <img src="assets/i/cart.png" alt="" id = "cart_img">
                        <div id = "cart_shadow"></div>
                        <p>Корзина</p>
                        
                </div>
                <div id = "cart_manage">
                    <table id = "cart_content">
                        <thead>
                            <th>Название</th>
                            <th>Количество</th>
                            <th>Цена</th>
                        </thead>
                        <tbody></tbody>
                        <tfoot>
                            <tr>
                              <td colspan="3">Итого: 0 руб.</td>
                            </tr>
                        </tfoot>
                    </table>
                    <button id = "cart_button">ОФОРМИТЬ ЗАКАЗ</button>
                </div>
            </div>
        </div>
        <div id = "product_list">
        </div>
    </main>
    <script src="scripts/product_list.js" type="module"></script>
    <script src="scripts/products.js" type="module"></script>
    <script src="scripts/menu.js" type="module"></script>
    <script src="scripts/sandwiches_options.js" type="module"></script>
</body>
</html>
