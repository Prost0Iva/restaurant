<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <title>idk</title>
        <link rel="stylesheet" href="CSS\main.css" />
        <link rel="stylesheet" href="CSS\cart.css" />
        <link rel="stylesheet" href="CSS\menu.css" />
        <link rel="stylesheet" href="CSS\modal_cart.css" />
        <link rel="stylesheet" href="CSS\modal_settings.css" />
        <link rel="stylesheet" href="CSS\value.css" />
    </head>
    <body>
        <div id="title">СДЕЛАЙТЕ ЗАКАЗ НАПРЯМУЮ ИЗ РЕСТОРАНА</div>
        <main>
            <div id="modal-overlay">
                <div id="modal">
                    <div id="modal-title">
                        <button id="modal-close">X</button>
                        <span id="modal-title-text">Текст</span>
                    </div>
                    <div id="modal-navig"></div>
                    <div id="modal-np-buttons">
                        <button id="modal-previous">< НАЗАД</button>
                        <button id="modal-next">ВПЕРЕД ></button>
                    </div>
                    <div id="modal-options"></div>
                    <div id="modal-finish"></div>
                    <div id="modal-foot">
                        <p id="modal-total-price"></p>
                    </div>
                </div>
            </div>

            <div id="modal-cart-overlay">
                <div id="modal">
                    <div id="modal-title">
                        <button id="modal-cart-close">X</button>
                        <span id="modal-title-text">Проверьте и подтвердите заказ</span>
                    </div>
                    <div id="modal-cart"></div>
                    <div id="modal-cart-foot">
                        <p id="modal-cart-total-price">Итого: 0 руб.</p>
                        <button id="confirm-the-order">Подтвердить заказ</button>
                    </div>
                </div>
            </div>

            <div id="menu">
                <div id="navig"></div>
                <div id="cart">
                    <div id="cart-title">
                        <img src="assets/i/cart.png" alt="" id="cart-img" />
                        <div id="cart-shadow"></div>
                        <p>Корзина</p>
                    </div>
                    <table class="cart-content">
                        <thead>
                            <th>Название</th>
                            <th>Количество</th>
                            <th>Цена</th>
                        </thead>
                    </table>
                    <div id="cart-manage">
                        <table class="cart-content">
                            <tbody></tbody>
                        </table>
                    </div>
                    <p id="cart-total-price">Итого: 0 руб.</p>
                    <button id="cart-button" disabled>ОФОРМИТЬ ЗАКАЗ</button>
                </div>
            </div>
            <div id="product-list"></div>
        </main>

        <script src="scripts/main.js" type="module"></script>
    </body>
</html>
